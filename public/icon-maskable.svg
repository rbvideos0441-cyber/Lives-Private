  <circle cx="256" cy="256" r="130" fill="none" stroke="url(#pinkGrad)" stroke-width="6" opacity="0.8"/>
  <!-- Central camera logo with a live pulsing dot -->
  <g transform="translate(166, 166) scale(0.7)" fill="none" stroke="url(#pinkGrad)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <!-- Camera Body -->
    <path d="M46.7 53.3h22.2l12.4-20h67l12.4 20h22.2A46.7 46.7 0 0 1 230 100v80A46.7 46.7 0 0 1 183.3 226.7H46.7A46.7 46.7 0 0 1 0 180v-80A46.7 46.7 0 0 1 46.7 53.3z" stroke-width="14" fill="#000000" fill-opacity="0.3"/>
    <!-- Outer Lens Ring -->
    <circle cx="115" cy="140" r="45" stroke-width="14"/>
    <!-- Interior lens reflection -->
    <circle cx="125" cy="130" r="15" fill="url(#pinkGrad)" stroke="none"/>
    <!-- Flash dot / Pulsing live state -->
